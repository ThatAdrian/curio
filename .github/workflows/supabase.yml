# Deploys edge functions whenever supabase/ changes — zero local tooling needed.
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN — supabase.com → Account → Access Tokens → Generate
#   SUPABASE_PROJECT_REF  — Dashboard → Settings → General → Reference ID
#
# Note: for the FIRST schema install, paste
# supabase/migrations/00001_initial_schema.sql into the Dashboard SQL Editor.
name: Supabase

on:
  push:
    branches: [main]
    paths: ["supabase/**"]
  workflow_dispatch:

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
